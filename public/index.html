<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess Who — Multiplayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- WAITING SCREEN -->
  <div id="screen-waiting" class="screen active">
    <div class="waiting-card">
      <div class="spinner"></div>
      <h1>Guess Who</h1>
      <p>Waiting for an opponent…</p>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen">
    <header class="game-header">
      <div class="header-title">Guess Who</div>
      <div id="turn-indicator" class="turn-indicator">—</div>
      <div id="secret-display" class="secret-display">Your secret: <span id="secret-name">?</span></div>
    </header>

    <main class="game-layout">
      <!-- Board -->
      <section class="board-section">
        <h2 class="section-title">Board</h2>
        <div id="board" class="board-grid"></div>
      </section>

      <!-- Side panel -->
      <aside class="side-panel">
        <!-- Ask a question -->
        <div class="panel-block">
          <h3>Ask a Question</h3>
          <div class="question-form">
            <select id="attr-select" class="select-input">
              <option value="">Select attribute…</option>
              <option value="gender">Gender</option>
              <option value="hair_color">Hair color</option>
              <option value="hair_type">Hair type</option>
              <option value="eye_color">Eye color</option>
              <option value="has_glasses">Wears glasses?</option>
              <option value="has_hat">Wears a hat?</option>
              <option value="has_beard">Has a beard?</option>
              <option value="has_mustache">Has a mustache?</option>
              <option value="skin_tone">Skin tone</option>
            </select>
            <select id="val-select" class="select-input" disabled>
              <option value="">Select value…</option>
            </select>
            <button id="btn-ask" class="btn btn-primary" disabled>Ask</button>
          </div>
        </div>

        <!-- Guess -->
        <div class="panel-block">
          <h3>Make a Guess</h3>
          <div class="guess-form">
            <select id="guess-select" class="select-input">
              <option value="">Select character…</option>
            </select>
            <button id="btn-guess" class="btn btn-accent" disabled>Guess!</button>
          </div>
        </div>

        <!-- History -->
        <div class="panel-block history-block">
          <h3>Q&amp;A History</h3>
          <ul id="history-list" class="history-list"></ul>
        </div>
      </aside>
    </main>
  </div>

  <!-- GAME OVER MODAL -->
  <div id="modal-gameover" class="modal hidden">
    <div class="modal-card">
      <div id="modal-icon" class="modal-icon">🏆</div>
      <h2 id="modal-title">You Win!</h2>
      <p id="modal-body"></p>
      <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <!-- DISCONNECT MODAL -->
  <div id="modal-disconnect" class="modal hidden">
    <div class="modal-card">
      <div class="modal-icon">🔌</div>
      <h2>Opponent disconnected</h2>
      <p>The game has ended.</p>
      <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
