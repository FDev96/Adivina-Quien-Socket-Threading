<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adivina Quién — Multijugador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- PANTALLA DE ESPERA -->
  <div id="screen-waiting" class="screen active">
    <div class="waiting-card">
      <div class="spinner"></div>
      <h1>Adivina Quién</h1>
      <p>Esperando a un oponente…</p>
    </div>
  </div>

  <!-- PANTALLA DE JUEGO -->
  <div id="screen-game" class="screen">
    <header class="game-header">
      <div class="header-title">Adivina Quién</div>
      <div id="turn-indicator" class="turn-indicator">—</div>
    </header>

    <main class="game-layout">
      <!-- Tablero -->
      <section class="board-section">
        <h2 class="section-title">Tablero</h2>
        <div id="board" class="board-grid"></div>
      </section>

      <!-- Panel lateral -->
      <aside class="side-panel">

        <!-- Tu personaje secreto -->
        <div class="panel-block secret-character-panel">
          <h3>Tu personaje secreto</h3>
          <div class="secret-char-card">
            <div class="secret-char-photo-wrap">
              <img id="secret-char-img" src="" alt="" loading="lazy"
                   onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iODAiIGhlaWdodD0iODAiIGZpbGw9IiMxRTFFMzgiLz48cGF0aCBkPSJNNDAgMjBDMzMuMzcgMjAgMjggMjUuMzcgMjggMzJDMjggMzguNjMgMzMuMzcgNDQgNDAgNDRDNDYuNjMgNDQgNTIgMzguNjMgNTIgMzJDNTIgMjUuMzcgNDYuNjMgMjAgNDAgMjBaTTE2IDY0QzE2IDU2LjI3IDI3LjI5IDUwIDQwIDUwQzUyLjcxIDUwIDY0IDU2LjI3IDY0IDY0SDY0VjY4SDE2VjY0WiIgZmlsbD0iIzJBMkE0QSIvPjwvc3ZnPg=='">
            </div>
            <div class="secret-char-info">
              <div class="secret-char-name" id="secret-char-name">—</div>
              <div class="secret-char-badges">
                <span class="secret-char-role" id="secret-char-role"></span>
                <span class="secret-char-party" id="secret-char-party"></span>
              </div>
              <div class="secret-char-fact" id="secret-char-fact"></div>
            </div>
          </div>
        </div>

        <!-- Hacer una pregunta -->
        <div class="panel-block">
          <h3>Hacer una Pregunta</h3>
          <div class="question-form">
            <select id="attr-select" class="select-input">
              <option value="">Seleccionar atributo…</option>
              <option value="paso_segunda_vuelta">¿Se quemó en 1ª vuelta?</option>
              <option value="fue_alcalde">¿Fue alcalde/alcaldesa?</option>
              <option value="fue_presidente">¿Fue presidente/a?</option>
              <option value="role">Cargo (Pdte / Vicepdte)</option>
              <option value="gender">Género</option>
              <option value="hair_color">Color de pelo</option>
              <option value="hair_type">Tipo de pelo</option>
              <option value="eye_color">Color de ojos</option>
              <option value="has_glasses">Lleva gafas?</option>
              <option value="has_hat">Lleva sombrero?</option>
              <option value="has_beard">Tiene barba?</option>
              <option value="has_mustache">Tiene bigote?</option>
              <option value="skin_tone">Tono de piel</option>
            </select>
            <select id="val-select" class="select-input" disabled>
              <option value="">Seleccionar valor…</option>
            </select>
            <button id="btn-ask" class="btn btn-primary" disabled>Preguntar</button>
          </div>
        </div>

        <!-- Adivinar -->
        <div class="panel-block">
          <h3>Hacer una Adivinanza</h3>
          <div class="guess-form">
            <select id="guess-select" class="select-input">
              <option value="">Seleccionar personaje…</option>
            </select>
            <button id="btn-guess" class="btn btn-accent" disabled>Adivinar!</button>
          </div>
        </div>

        <!-- Historial -->
        <div class="panel-block history-block">
          <h3>Historial de Preguntas</h3>
          <ul id="history-list" class="history-list"></ul>
        </div>
      </aside>
    </main>
  </div>

  <!-- MODAL DE FIN DE JUEGO -->
  <div id="modal-gameover" class="modal hidden">
    <div class="modal-card">
      <div id="modal-icon" class="modal-icon">🏆</div>
      <h2 id="modal-title">¡Has Ganado!</h2>
      <p id="modal-body"></p>
      <button class="btn btn-primary" onclick="location.reload()">Jugar de Nuevo</button>
    </div>
  </div>

  <!-- MODAL DE DESCONEXIÓN -->
  <div id="modal-disconnect" class="modal hidden">
    <div class="modal-card">
      <div class="modal-icon">🔌</div>
      <h2>Oponente desconectado</h2>
      <p>La partida ha terminado.</p>
      <button class="btn btn-primary" onclick="location.reload()">Jugar de Nuevo</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
