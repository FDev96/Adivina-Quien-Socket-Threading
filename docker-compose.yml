services:
  app:
    build:
      context: .
    restart: unless-stopped
    expose:
      - "8080"
      - "8765"

  nginx:
    build:
      context: ./nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl
    restart: unless-stopped
