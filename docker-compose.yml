services:
  app:
    build:
      context: .
    restart: unless-stopped
    expose:
      - "8080"
      - "8765"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "81:81"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
