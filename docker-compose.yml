services:
  app:
    build:
      context: .
    restart: unless-stopped
    expose:
      - "8080"
      - "8765"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped
