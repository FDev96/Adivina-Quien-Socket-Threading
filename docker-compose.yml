services:
  app:
    build:
      context: .
    restart: unless-stopped
    expose:
      - "8080"
      - "8765"

  proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./proxy-manager/data:/data
      - ./proxy-manager/letsencrypt:/etc/letsencrypt
    restart: unless-stopped
